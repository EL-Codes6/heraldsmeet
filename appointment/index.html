<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HERALDS · 3D appointment book</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <!-- Google Font + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Three.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
 


</head>
<body>
  <!-- Three.js canvas will be injected here -->
  <div id="three-canvas"></div>

  <div class="content">
    <!-- HERO section -->
    <div class="hero">
      <h1>
        <i class="fas fa-calendar-alt"></i> HERALDS MEET
      </h1>
      <p><i class="fas fa-sparkle" style="margin-right: 8px;"></i> 3D · appointment-booking system</p>
    </div>

    <!-- MAIN APP -->
    <main>
      <!-- LEFT PANEL – BOOKING ENGINE (3D tilt) -->
      <div class="card booking-card" id="bookingCard">
        <h2><i class="fas fa-pen-alt"></i> schedule moment</h2>
        <div class="date-picker">
          <label><i class="far fa-calendar"></i> select date</label>
          <input type="date" id="datePicker">
        </div>

        <div class="time-slots">
          <label><i class="far fa-clock"></i> available rays</label>
          <div class="slots-grid" id="slotsContainer">
            <!-- JS will fill dynamic slots -->
          </div>
        </div>

        <div class="user-details">
          <input type="text" id="name" placeholder="your name" autocomplete="off">
          <input type="email" id="email" placeholder="email address">
          <input type="tel" id="phone" placeholder="phone (optional)">
          <button class="btn-primary" id="bookBtn">
            <i class="fas fa-bolt"></i> BOOK THIS SLOT
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- RIGHT PANEL – EXISTING APPOINTMENTS -->
      <div class="card">
        <h2><i class="fas fa-list-check"></i> your bookings</h2>
        <div id="appointmentsList" class="appointments-list">
          <!-- dynamic list -->
        </div>
      </div>
    </main>
  </div>

 
</body>
</html>
